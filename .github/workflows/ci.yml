name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: apps/api/pyproject.toml

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run manage.py migrate --run-syncdb

      - name: Run tests
        run: uv run manage.py test

  web:
    name: Web — test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=apps/web

      - name: Build
        env:
          VITE_API_URL: ${{ vars.WEB_API_URL }}
        run: npm run build --workspace=apps/web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  admin:
    name: Admin — test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=apps/admin

      - name: Build
        env:
          VITE_API_URL: ${{ vars.ADMIN_API_URL }}
        run: npm run build --workspace=apps/admin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist/

  mobile:
    name: Mobile — type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type-check
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.MOBILE_API_URL }}
        run: npx tsc --noEmit

